<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camden Elwell - Resume</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --ink-black: #0d1f2d;
            --blue-slate: #546a7b;
            --cool-steel: #9ea3b0;
            --soft-blush: #fae1df;
            --desert-sand: #e4c3ad;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; color: var(--ink-black); line-height: 1.6; }
        
        /* Navigation */
        nav { background-color: var(--ink-black); padding: 0.5rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .brand-link { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .brand-name { color: var(--soft-blush); font-size: 1.5rem; font-weight: bold; }
        
        /* Tab Logic: Keeping order but hiding current */
        .nav-links { display: flex; gap: 15px; border-left: 2px solid var(--blue-slate); padding-left: 20px; }
        .nav-label { color: var(--cool-steel); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem; text-decoration: none; }
        .nav-label:hover { color: var(--soft-blush); }
        .nav-resume-link { display: none; } /* Hidden on Resume page */

        /* Contact Dropdown */
        .btn { background-color: var(--desert-sand); color: var(--ink-black); padding: 8px 20px; border-radius: 5px; font-weight: bold; border: none; cursor: pointer; }
        .contact-content { display: none; position: absolute; right: 5%; top: 60px; background-color: var(--soft-blush); min-width: 260px; padding: 20px; border-radius: 8px; border: 2px solid var(--desert-sand); box-shadow: 0 8px 16px rgba(0,0,0,0.2); z-index: 1001; }
        .contact-content.show { display: block; }

        /* Resume Physical Display */
        .resume-container { padding: 40px 5%; display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .resume-page { max-width: 900px; width: 100%; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .resume-page img { width: 100%; display: block; }

        .download-btn { margin: 20px 0 50px; background: var(--blue-slate); color: white; padding: 15px 30px; border-radius: 5px; font-weight: bold; text-decoration: none; }
        .download-btn:hover { background: var(--ink-black); }

        footer { background-color: var(--ink-black); color: var(--cool-steel); text-align: center; padding: 30px; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="index.html" class="brand-link">
                <img src="camelwell.png" alt="Logo" style="height:50px;">
                <span class="brand-name">Camden Elwell</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-label">Home</a>
                <a href="projects.html" class="nav-label">Projects</a>
                <a href="resume.html" class="nav-label nav-resume-link">Resume</a>
            </div>
        </div>
        <button class="btn" id="contactBtn">Contact</button>
        <div class="contact-content" id="contactDropdown">
            <p><strong>Email:</strong> <a href="mailto:camdenelwell@gmail.com">camdenelwell@gmail.com</a></p>
            <p><strong>Phone:</strong> (772) 643-5646</p>
        </div>
    </nav>

    <div class="resume-container">
        <div class="resume-page"><img src="resume-page1.png" alt="Resume Page 1"></div>
        <div class="resume-page"><img src="resume-page2.png" alt="Resume Page 2"></div>
        <a href="resume.pdf" class="download-btn" download>Download PDF Instead</a>
    </div>

    <footer>&copy; 2026 Camden Elwell | Tallahassee, FL</footer>

    <script>
        const btn = document.getElementById('contactBtn');
        const dropdown = document.getElementById('contactDropdown');
        btn.onclick = (e) => { dropdown.classList.toggle('show'); e.stopPropagation(); };
        window.onclick = () => dropdown.classList.remove('show');
    </script>
</body>
</html>
